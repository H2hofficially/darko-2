[build]
  # `inject-meta.mjs` patches dist/index.html with the meta tags +html.tsx
  # defines (lang/notranslate/google notranslate/favicon/OG/title/etc) since
  # Expo Router's "single" output mode ignores +html.tsx. See scripts/inject-meta.mjs.
  command = "npx expo export --platform web && node scripts/inject-meta.mjs"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Referrer-Policy = "strict-origin-when-cross-origin"
