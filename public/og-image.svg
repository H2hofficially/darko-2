<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Darko — Relationship Intelligence">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#27272A" stroke-width="1"/>
    </pattern>
    <radialGradient id="fade" cx="20%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#000" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <mask id="gridMask">
      <rect width="1200" height="630" fill="url(#fade)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#gridMask)" opacity="0.32"/>

  <!-- Top kicker -->
  <g transform="translate(96, 122)">
    <rect x="0" y="-6" width="40" height="2" fill="#CCFF00"/>
    <text x="56" y="0"
          font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, 'Courier New', monospace"
          font-size="20" font-weight="500" fill="#CCFF00" letter-spacing="3">// RELATIONSHIP INTELLIGENCE</text>
  </g>

  <!-- Wordmark — single text element, tspan continues from previous = no font-metric guesswork -->
  <text x="96" y="320"
        font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, 'Courier New', monospace"
        font-size="180" font-weight="700" letter-spacing="-4">
    <tspan fill="#FAFAFA">Darko</tspan><tspan fill="#CCFF00">_</tspan>
  </text>

  <!-- Tagline -->
  <text x="96" y="400"
        font-family="ui-sans-serif, Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="38" font-weight="500" fill="#A1A1AA" letter-spacing="-1">Stop guessing. Start operating.</text>

  <!-- Bottom strip — anchored to edges so font-width can't push it off-canvas -->
  <text x="96" y="558"
        font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, 'Courier New', monospace"
        font-size="16" font-weight="500" fill="#52525b" letter-spacing="2">DARKOAPP.COM</text>
  <text x="1104" y="558" text-anchor="end"
        font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, 'Courier New', monospace"
        font-size="16" font-weight="500" fill="#52525b" letter-spacing="2">v4.0 — LIVE</text>
</svg>
