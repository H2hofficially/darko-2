<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56" width="260" height="56" role="img" aria-label="Darko">
  <style>
    @keyframes darko-blink { 0%, 49.99% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .darko-wordmark { font-family: 'JetBrains Mono', ui-monospace, Menlo, Consolas, 'Courier New', monospace; font-weight: 700; }
    .darko-cursor { animation: darko-blink 1.06s steps(1, end) infinite; }
  </style>
  <text class="darko-wordmark" x="0" y="42" font-size="40" fill="#FAFAFA">Darko</text>
  <text class="darko-wordmark darko-cursor" x="120" y="42" font-size="40" fill="#CCFF00">_</text>
</svg>
